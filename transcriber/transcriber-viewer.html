<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transcriber viewer</title>
  <style>
    #waveform-wrapper {
      position: relative;
    }
    #waveform ::part(region) {
      border-left: 0.5px dotted rgb(0, 0, 0, 0.2) !important;
    }
    #label-scroll {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }
    #window-controls {
      /* display: flex; */
      align-items: center;
      gap: 6px;
      /* margin-bottom: 6px; */
      /* font-family: sans-serif; */
      /* font-size: 13px; */
    }
  </style>
</head>
<body>

<p id="info"></p>
<div id="waveform-wrapper">
  <div id="waveform"></div>
  <div id="label-scroll">
    <canvas id="label-canvas"></canvas>
  </div>
</div>
<br>
<div id="window-controls">
  <span>Window:</span>
  <button class="length-button" data-sec="5">5s</button>
  <button class="length-button" data-sec="10">10s</button>
  <button class="length-button" data-sec="15">15s</button>
  <button class="length-button active" data-sec="20">20s</button>
  <button class="length-button" data-sec="25">25s</button>
  <button class="length-button" data-sec="30">30s</button>
  <!-- <button class="length-button" data-sec="45">45s</button> -->
  <!-- <button class="length-button" data-sec="60">60s</button> -->
</div>
<button id="play-button" disabled>Play</button>

<script type="module">
import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
import TimelinePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.esm.js'

function triadColor(triad) {
  const quality = triad.split(':')[1]
  return quality === 'maj'
    ? 'rgba(255, 204, 138, 0.15)'
    : 'rgba(145, 203, 251, 0.15)'
}

const HEIGHT = 400
const ROW_HEIGHT = 16
const LABEL_FONT = '15px serif'

let windowSeconds = 15   // matches the default .active button

// Derive px/sec from the container width and chosen window length.
function calcPxPerSec() {
  const containerWidth = document.getElementById('waveform').clientWidth || window.innerWidth
  return containerWidth / windowSeconds
}

const data = await fetch('test.json').then(r => r.json())

const audioCtx = new AudioContext()
const decoded = await fetch(data.file_path)
  .then(r => r.arrayBuffer())
  .then(b => audioCtx.decodeAudioData(b))
const sampleRate = decoded.sampleRate
const duration = decoded.duration
await audioCtx.close()

const uniqueTriads = [...new Set(data.segments.map(s => s[2]))]
document.getElementById('info').textContent =
  `${data.file_path} — ${sampleRate.toLocaleString()} Hz — ${duration.toFixed(2)}s — ${uniqueTriads.length} unique triads`

const segments = data.segments.map(([startFrame, endFrame, triad]) => ({
  start: startFrame / sampleRate,
  end:   endFrame   / sampleRate,
  triad,
}))

const regions = RegionsPlugin.create()

const ws = WaveSurfer.create({
  container: '#waveform',
  waveColor: 'rgb(182, 185, 192, 0.3)',
  progressColor: '#6c80b8',
  cursorColor: '#23bcee',
  backgroundColor: '#1a1a1a',
  height: HEIGHT,
  barWidth: 2,
  barGap: 0.5,
  barRadius: 0.5,
  minPxPerSec: calcPxPerSec(),
  normalize: false,
  plugins: [regions, TimelinePlugin.create()],
})

ws.load(data.file_path)

// Redraws the label canvas for a given px/sec value.
function drawLabels(pxPerSec) {
  const canvas = document.getElementById('label-canvas')
  canvas.width  = Math.ceil(duration * pxPerSec)
  canvas.height = HEIGHT
  const ctx     = canvas.getContext('2d')
  ctx.font      = LABEL_FONT
  ctx.fillStyle = 'rgba(0, 0, 0)'

  const measure = document.createElement('canvas').getContext('2d')
  measure.font  = LABEL_FONT

  let lastRight = 0
  let shift     = -1

  for (const seg of segments) {
    const start = seg.start * pxPerSec
    const width = measure.measureText(seg.triad).width

    if (lastRight > start) {
      shift = shift + 1
    } else {
      shift = 0
    }

    ctx.fillText(seg.triad, start + 1, ROW_HEIGHT + ROW_HEIGHT * shift)
    lastRight = start + width
  }
}

ws.on('ready', () => {
  document.getElementById('play-button').disabled = false
  document.getElementById('play-button').onclick = () => ws.playPause()

  // colored regions — no content, labels handled by canvas
  for (const seg of segments) {
    regions.addRegion({
      start:  seg.start,
      end:    seg.end,
      color:  triadColor(seg.triad),
      drag:   false,
      resize: false,
    })
  }

  drawLabels(calcPxPerSec())

  // Sync label strip scroll with waveform scroll.
  ws.on('scroll', (visibleStartTime) => {
    document.getElementById('label-scroll').scrollLeft =
      visibleStartTime * calcPxPerSec()
  })
})

// Window-length button handling.
document.getElementById('window-controls').addEventListener('click', e => {
  const button = e.target.closest('.length-button')
  if (!button) return

  // Update active state.
  document.querySelectorAll('.length-button').forEach(b => b.classList.remove('active'))
  button.classList.add('active')

  windowSeconds = Number(button.dataset.sec)
  const pxPerSec = calcPxPerSec()

  ws.zoom(pxPerSec)
  drawLabels(pxPerSec)
})

ws.on('play',  () => document.getElementById('play-button').textContent = 'Pause')
ws.on('pause', () => document.getElementById('play-button').textContent = 'Play')
ws.on('finish',() => document.getElementById('play-button').textContent = 'Play')
</script>

</body>
</html>
