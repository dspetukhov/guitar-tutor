<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transcriber viewer</title>
  <style>
    #harmony-waveform-wrapper {
      position: relative;
      contain: layout paint style;
    }
    #harmony-waveform, #harmony-label-canvas {
      will-change: transform, opacity;
    }
    #harmony-waveform ::part(region) {
      border-left: 0.5px dotted rgb(0, 0, 0, 0.2) !important;
    }
    #harmony-label-scroll {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
<!--
  To Do:
  - chord/triad chart of its musical content
  - player zooming: pre-selected window length (alter MIN_PX_PER_SEC)
  - player slowing down at pre-selected rates
  - how can I measure that this particular transcription is good enough (matches original recording somehow)? what metrics to choose? - !Analyze
  - add a beat grid to anticipate changes

  - [optional] crispy/clean-cut fonts
  - [optional] memory bank: how current triad is constructed (hint or exact notes)
  - [optional] add pitch: how high/low current note or triad is compared to others
  - [optional] separate horizontal bar for triads (harmony lane) and a separate one for notes (melody lane) and for chords (another harmony lane) - !After implementing note identification
-->
<p id="info"></p>
<div id="harmony-waveform-wrapper">
  <div id="harmony-waveform"></div>
  <div id="harmony-label-scroll">
    <canvas id="harmony-label-canvas"></canvas>
  </div>
</div>
<div id="melody-waveform-wrapper">
  <div id="melody-waveform"></div>
  <div id="melody-label-scroll">
    <canvas id="melody-label-canvas"></canvas>
  </div>
</div>
<br>
<button id="play-button" disabled>Play</button>

<script type="module">
import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
import TimelinePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.esm.js'

function triadColor(triad) {
  const quality = triad.split(':')[1]
  return quality === 'maj'
    ? 'rgba(255, 204, 138, 0.15)'
    : 'rgba(145, 203, 251, 0.15)'
}

const HEIGHT = 400
const MIN_PX_PER_SEC = 150
const ROW_HEIGHT = 16
const LABEL_FONT = '15px serif'

const data = await fetch('test.json').then(r => r.json())

// const sampleRate = data.sample_rate
const duration = data.duration

const triadMap = {}
for (const seg of data.harmony_segments) {
  triadMap[seg[2]] = true
}
const uniqueTriads = Object.keys(triadMap)

document.getElementById('info').textContent =
  `${data.file_path} — ${duration.toFixed(2)}s — ${uniqueTriads.length} unique triads`

const segments = data.harmony_segments.map(([startFrame, endFrame, triad]) => ({
  start: startFrame,
  end:   endFrame,
  triad,
}))

const regions = RegionsPlugin.create()

const ws = WaveSurfer.create({
  container: '#harmony-waveform',
  waveColor: 'rgb(182, 185, 192, 0.3)',
  progressColor: '#6c80b8',
  cursorColor: '#23bcee',
  backgroundColor: '#1a1a1a',
  height: HEIGHT,
  barWidth: 2,
  barGap: 0.5,
  barRadius: 0.5,
  minPxPerSec: MIN_PX_PER_SEC,
  normalize: false,
  plugins: [regions, TimelinePlugin.create()],
})

const ws_melody = WaveSurfer.create({
  container: '#melody-waveform',
  waveColor: 'rgb(182, 185, 192, 0.3)',
  progressColor: '#6c80b8',
  cursorColor: '#23bcee',
  backgroundColor: '#1a1a1a',
  height: HEIGHT,
  barWidth: 2,
  barGap: 0.5,
  barRadius: 0.5,
  minPxPerSec: MIN_PX_PER_SEC,
  normalize: false,
  plugins: [TimelinePlugin.create()],
})

ws.load(data.file_path)

ws.on('ready', () => {
  document.getElementById('play-button').disabled = false
  document.getElementById('play-button').onclick = () => ws.playPause()

  // colored regions — no content, labels handled by canvas
  for (const seg of segments) {
    regions.addRegion({
      start:  seg.start,
      end:    seg.end,
      color:  triadColor(seg.triad),
      drag:   false,
      resize: false,
    })
  }

  // draw labels on canvas with greedy non-overlap placement
  const canvas = document.getElementById('harmony-label-canvas');
  canvas.width  = Math.ceil(duration * MIN_PX_PER_SEC)
  canvas.height = HEIGHT
  const ctx     = canvas.getContext('2d')
  ctx.font      = LABEL_FONT
  ctx.fillStyle = 'rgba(0, 0, 0)'

  let lastRight = 0
  let shift = -1

  const measure = document.createElement('canvas').getContext('2d')
  measure.font = LABEL_FONT

  for (const seg of segments) {
    const start = seg.start * MIN_PX_PER_SEC
    const width = measure.measureText(seg.triad).width
    const end   = seg.end * MIN_PX_PER_SEC

    if (lastRight > start) {
      shift = shift + 1;
    } else {
      shift = 0;
    }

    ctx.fillText(seg.triad, start + 1, ROW_HEIGHT + ROW_HEIGHT * shift)
    lastRight = start + width
  }

  // sync label strip scroll with waveform scroll using WaveSurfer's 'scroll' event
  ws.on('scroll', (visibleStartTime, _visibleEndTime) => {
    document.getElementById('harmony-label-scroll').scrollLeft =
      visibleStartTime * MIN_PX_PER_SEC
    }
  )
})

ws.on('play',  () => document.getElementById('play-button').textContent = 'Pause')
ws.on('pause', () => document.getElementById('play-button').textContent = 'Play')
ws.on('finish',() => document.getElementById('play-button').textContent = 'Play')

// Destroy on unload
window.addEventListener('beforeunload', () => {
  if (ws) {
      ws.stop();
      ws.destroy();
  }
})
</script>

</body>
</html>
