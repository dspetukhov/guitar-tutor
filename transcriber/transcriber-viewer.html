<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transcriber viewer</title>
  <style>
    #waveform-wrapper {
      position: relative;
      contain: layout paint style;
    }
    #waveform, #label-canvas {
      will-change: transform, opacity;
    }
    #waveform ::part(region) {
      border-left: 0.5px dotted rgb(0, 0, 0, 0.2) !important;
    }
    #label-scroll {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>

<p id="info"></p>
<div id="waveform-wrapper">
  <div id="waveform"></div>
  <div id="label-scroll">
    <canvas id="label-canvas"></canvas>
  </div>
</div>
<br>
<div id="controls" style="display:flex; align-items:center; gap:8px; margin-top:6px;">
  <button id="play-button" disabled>Play</button>
  <!-- <span style="color:#aaa;">Speed:</span> -->
  <div id="speed-buttons" style="display:flex; gap:4px;"></div>
</div>

<script type="module">
import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
import TimelinePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.esm.js'

function triadColor(triad) {
  const quality = triad.split(':')[1]
  return quality === 'maj'
    ? 'rgba(255, 204, 138, 0.15)'
    : 'rgba(145, 203, 251, 0.15)'
}

const HEIGHT = 400
const MIN_PX_PER_SEC = 150
const ROW_HEIGHT = 16
const LABEL_FONT = '15px serif'

// Speed buttons — 100% down to 50% in 5% steps
const speeds = [1.00, 0.90, 0.80, 0.70, 0.60, 0.50]
let activeSpeed = 1.00

const data = await fetch('test.json').then(r => r.json())

const audioCtx = new AudioContext()
const decoded = await fetch(data.file_path)
  .then(r => r.arrayBuffer())
  .then(b => audioCtx.decodeAudioData(b))
const sampleRate = decoded.sampleRate
const duration = decoded.duration
await audioCtx.close()

const triadMap = {}
for (const seg of data.segments) {
  triadMap[seg[2]] = true
}
const uniqueTriads = Object.keys(triadMap)

document.getElementById('info').textContent =
  `${data.file_path} — ${sampleRate.toLocaleString()} Hz — ${duration.toFixed(2)}s — ${uniqueTriads.length} unique triads`

const segments = data.segments.map(([startFrame, endFrame, triad]) => ({
  start: startFrame / sampleRate,
  end:   endFrame   / sampleRate,
  triad,
}))

const regions = RegionsPlugin.create()

const ws = WaveSurfer.create({
  container: '#waveform',
  waveColor: 'rgb(182, 185, 192, 0.3)',
  progressColor: '#6c80b8',
  cursorColor: '#23bcee',
  backgroundColor: '#1a1a1a',
  height: HEIGHT,
  barWidth: 2,
  barGap: 0.5,
  barRadius: 0.5,
  minPxPerSec: MIN_PX_PER_SEC,
  normalize: false,
  plugins: [regions, TimelinePlugin.create()],
})

const speedContainer = document.getElementById('speed-buttons')

for (const rate of speeds) {
  const button = document.createElement('button')
  button.textContent = `${Math.round(rate * 100)}%`
  button.dataset.rate = rate
  button.style.cssText = `
    padding: 2px 7px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    background: ${rate === 1.00 ? '#4a6fa5' : '#2a2a2a'};
    color: ${rate === 1.00 ? '#fff' : '#ccc'};
  `
  button.onclick = () => {
    activeSpeed = rate
    ws.setPlaybackRate(rate, true)
    speedContainer.querySelectorAll('button').forEach(b => {
      const isActive = parseFloat(b.dataset.rate) === rate
      b.style.background = isActive ? '#4a6fa5' : '#2a2a2a'
      b.style.color       = isActive ? '#fff'    : '#ccc'
    })
  }
  speedContainer.appendChild(button)
}

ws.load(data.file_path)

ws.on('ready', () => {
  document.getElementById('play-button').disabled = false
  document.getElementById('play-button').onclick = () => ws.playPause()

  // colored regions — no content, labels handled by canvas
  for (const seg of segments) {
    regions.addRegion({
      start:  seg.start,
      end:    seg.end,
      color:  triadColor(seg.triad),
      drag:   false,
      resize: false,
    })
  }

  // draw labels on canvas with greedy non-overlap placement
  const canvas = document.getElementById('label-canvas');
  canvas.width  = Math.ceil(duration * MIN_PX_PER_SEC)
  canvas.height = HEIGHT
  const ctx     = canvas.getContext('2d')
  ctx.font      = LABEL_FONT
  ctx.fillStyle = 'rgba(0, 0, 0)'

  let lastRight = 0
  let shift = -1

  const measure = document.createElement('canvas').getContext('2d')
  measure.font = LABEL_FONT

  for (const seg of segments) {
    const start = seg.start * MIN_PX_PER_SEC
    const width = measure.measureText(seg.triad).width
    const end   = seg.end * MIN_PX_PER_SEC

    if (lastRight > start) {
      shift = shift + 1;
    } else {
      shift = 0;
    }

    ctx.fillText(seg.triad, start + 1, ROW_HEIGHT + ROW_HEIGHT * shift)
    lastRight = start + width
  }

  button.onclick = () => {
    activeSpeed = rate
    if (rate !== 1.00) ws.setPlaybackRate(rate, true)
    else ws.setPlaybackRate(1.00)   // no need for pitch-preservation at normal speed
    // update highlights...
  }

  // sync label strip scroll with waveform scroll using WaveSurfer's 'scroll' event
  ws.on('scroll', (visibleStartTime, _visibleEndTime) => {
    document.getElementById('label-scroll').scrollLeft =
      visibleStartTime * MIN_PX_PER_SEC
    }
  )
})

ws.on('play',  () => document.getElementById('play-button').textContent = 'Pause')
ws.on('pause', () => document.getElementById('play-button').textContent = 'Play')
ws.on('finish',() => document.getElementById('play-button').textContent = 'Play')
</script>

</body>
</html>
