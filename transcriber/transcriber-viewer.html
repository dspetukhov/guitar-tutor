<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transcriber viewer</title>
  <style>
    #info {
      margin: 4px 0 8px;
      opacity: 0.7;
    }

    #lane-wrapper {
      position: relative;
      contain: layout paint style;
      margin-bottom: 6px;
    }

    /* full-height dotted left border on every harmony region */
    #lane-wrapper ::part(region) {
      border-left: 0.5px dotted rgba(0, 0, 0, 0.5) !important;
    }

    #label-scroll {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      /* stop just above the WaveSurfer scrollbar row (~15 px) */
      bottom: 15px;
      overflow: hidden;
      pointer-events: none;
    }

    #play-button {
      margin-top: 5px;
      padding: 5px 15px;
      /* background: #2a2a2a; */
      color: #ccc;
      border: 2px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    #play-button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
<!--
  To Do:
  - chord/triad chart of its musical content
  - player zooming: pre-selected window length (alter MIN_PX_PER_SEC)
  - player slowing down at pre-selected rates
  - add a beat grid to anticipate changes

  - [optional] crispy/clean-cut fonts
  - [optional] memory bank: how current triad is constructed (hint or exact notes)
  - [optional] add pitch: how high/low current note or triad is compared to others
  - [optional] separate horizontal bar for triads (harmony lane) and a separate one for notes (melody lane) and for chords (another harmony lane) - !After implementing note identification
-->
<p id="info"></p>

<div id="lane-wrapper">
  <div id="waveform"></div>
  <div id="label-scroll">
    <canvas id="label-canvas"></canvas>
  </div>
</div>

<button id="play-button" disabled>Play</button>

<script type="module">
import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
import TimelinePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.esm.js'

// constants
const HEIGHT         = 500
const MIN_PX_PER_SEC = 150
const ROW_HEIGHT     = 20
const LABEL_FONT     = '15px monospace'

// Top zone: harmony labels cascade downward from this Y baseline
const HARMONY_LABEL_TOP = ROW_HEIGHT

// Bottom zone: melody labels cascade upward from this Y baseline.
// Reserve the bottom ROW_HEIGHT for the tick row; labels sit above that.
const MELODY_LABEL_BOTTOM = HEIGHT - ROW_HEIGHT

// colour helpers
function harmonyColor(label) {
  const quality = label.split(':')[1]
  if (quality === 'maj') return 'rgba(255, 204, 138, 0.15)'
  if (quality === 'min') return 'rgba(145, 203, 251, 0.15)'
  return 'rgba(200, 200, 200, 0.10)'
}

// canvas drawing
function drawLabels(canvas, segmentsHarmony, segmentsMelody, duration) {
  canvas.width  = Math.ceil(duration * MIN_PX_PER_SEC)
  canvas.height = HEIGHT

  const ctx   = canvas.getContext('2d')
  ctx.font = LABEL_FONT
  ctx.fillStyle = 'rgba(5, 5, 5, 0.75)'

  // offscreen canvas just for text measurement
  const ruler = Object.assign(document.createElement('canvas').getContext('2d'), { font: LABEL_FONT })

  // harmony labels: cascade downward
  {
    let lastRight = 0
    let row       = 0
    for (const seg of segmentsHarmony) {
      const x     = seg.start * MIN_PX_PER_SEC
      const width = ruler.measureText(seg.label).width
      row = (x < lastRight) ? row + 1 : 0
      ctx.fillText(seg.label, x + 3, HARMONY_LABEL_TOP + ROW_HEIGHT * row)
      lastRight = x + width
    }
  }

  // melody labels: cascade upward
  ctx.fillStyle = 'rgba(5, 5, 5, 0.75)'
  {
    let lastRight = 0
    let row       = 0
    for (const seg of segmentsMelody) {
      const x     = seg.start * MIN_PX_PER_SEC
      const width = ruler.measureText(seg.label).width
      row = (x < lastRight) ? row + 1 : 0
      // baseline moves upward with each extra row
      ctx.fillText(seg.label, x + 3, MELODY_LABEL_BOTTOM - ROW_HEIGHT * row)
      lastRight = x + width
    }
  }

  // melody tick marks: short vertical lines just above bottom edge
  // lighter and shorter than the full-height harmony region borders
  const TICK_HEIGHT = Math.round(HEIGHT * 0.25)   // ~25% of lane height
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.95)'
  ctx.lineWidth   = 0.5
  ctx.lineCap     = 'round'
  ctx.setLineDash([0, 4])
  for (const seg of segmentsMelody) {
    const x = Math.round(seg.start * MIN_PX_PER_SEC) + 0.0
    ctx.beginPath()
    ctx.moveTo(x, HEIGHT - TICK_HEIGHT)
    ctx.lineTo(x, HEIGHT)
    ctx.stroke()
  }
}

// load data
const data     = await fetch('test.json').then(r => r.json())
const duration = data.duration

const segmentsHarmony = data.harmony_segments.map(([start, end, label]) => ({ start, end, label }))
const segmentsMelody  = (data.melody_segments ?? []).map(([start, end, label]) => ({ start, end, label }))

const uniqueTriads = new Set(segmentsHarmony.map(s => s.label)).size
document.getElementById('info').textContent =
  `${data.file_path} — ${duration.toFixed(2)}s — ${uniqueTriads} unique triads`

// wavesurfer
const regions = RegionsPlugin.create()

const ws = WaveSurfer.create({
  container:       '#waveform',
  waveColor:       'rgba(182, 185, 192, 0.25)',
  progressColor:   '#6c80b8',
  cursorColor:     '#23bcee',
  backgroundColor: '#1a1a1a',
  height:          HEIGHT,
  barWidth:        2,
  barGap:          0.5,
  barRadius:       0.5,
  minPxPerSec:     MIN_PX_PER_SEC,
  normalize:       true,
  plugins:         [regions, TimelinePlugin.create()],
})

ws.load(data.file_path)

// ready
ws.on('ready', () => {
  document.getElementById('play-button').disabled = false

  // Harmony colored regions (full-height borders come from CSS ::part(region))
  for (const seg of segmentsHarmony) {
    regions.addRegion({
      start:  seg.start,
      end:    seg.end,
      color:  harmonyColor(seg.label),
      drag:   false,
      resize: false,
    })
  }

  // Draw all labels + melody ticks on shared canvas
  drawLabels(
    document.getElementById('label-canvas'),
    segmentsHarmony,
    segmentsMelody,
    duration,
  )

  // Sync label strip scroll with waveform scroll
  ws.on('scroll', (visibleStartTime) => {
    document.getElementById('label-scroll').scrollLeft = visibleStartTime * MIN_PX_PER_SEC
  })
})

// playback control
const playButton = document.getElementById('play-button')
playButton.onclick = () => ws.playPause()

ws.on('play',   () => playButton.textContent = 'Pause')
ws.on('pause',  () => playButton.textContent = 'Play')
ws.on('finish', () => playButton.textContent = 'Play')

// destroy on unload
window.addEventListener('beforeunload', () => ws.destroy())
</script>
</body>
</html>
