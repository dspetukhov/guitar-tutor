<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transcriber viewer</title>
  <style>
    #info {
      margin: 4px 0 8px;
      /* font-size: 13px; */
      opacity: 0.7;
    }
    .lane-wrapper {
      position: relative;
      contain: layout paint style;
      margin-bottom: 6px;
    }
    .lane-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 2px;
    }
    /* dotted left-border on every region */
    .lane-wrapper wavesurfer ::part(region) {
      border-left: 0.5px dotted rgb(0, 0, 0, 0.2) !important;
    }
    #harmony-waveform-wrapper {
      position: relative;
      contain: layout paint style;
    }
    #harmony-waveform, #harmony-label-canvas {
      will-change: transform, opacity;
    }
    /* #harmony-waveform ::part(region) {
      border-left: 0.5px dotted rgb(0, 0, 0, 0.2) !important;
    } */
    #harmony-label-scroll {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    #play-button {
      margin-top: 5px;
      padding: 5px 15px;
      /* background: #2a2a2a; */
      color: #ccc;
      border: 2px solid #444;
      border-radius: 2px;
      cursor: pointer;
    }
    /* #play-button:hover { background: #333; } */
    #play-button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>

  <div class="label-scroll" id="harmony-label-scroll">
    <canvas id="harmony-label-canvas"></canvas>
  </div>
</div>

import WaveSurfer from 'https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.esm.js'
import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
import TimelinePlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.esm.js'

// constants
const HEIGHT = 400
const MIN_PX_PER_SEC = 150
const ROW_HEIGHT = 16
const LABEL_FONT = '15px serif'

const WS_DEFAULTS = {
  waveColor:       'rgba(182, 185, 192, 0.3)',
  progressColor:   '#6c80b8',
  cursorColor:     '#23bcee',
  backgroundColor: '#1a1a1a',
  height:          HEIGHT,
  barWidth:        2,
  barGap:          0.5,
  barRadius:       0.5,
  minPxPerSec:     MIN_PX_PER_SEC,
  normalize:       false,
}

// colour for segments
function segmentColor(label) {
  // harmony triads: "C:maj", "A:min" etc.
  const quality = label.split(':')[1]
  if (quality === 'maj') return 'rgba(255, 204, 138, 0.15)'
  if (quality === 'min') return 'rgba(145, 203, 251, 0.15)'
  // melody notes: plain note names — use a neutral tint
  return 'rgba(180, 150, 255, 0.15)'
}

function triadColor(triad) {
  const quality = triad.split(':')[1]
  return quality === 'maj'
    ? 'rgba(255, 204, 138, 0.15)'
    : 'rgba(145, 203, 251, 0.15)'
}

// load data
const data      = await fetch('test.json').then(r => r.json())
const duration  = data.duration

const triadMap = {}
for (const seg of data.harmony_segments) {
  triadMap[seg[2]] = true
}
const uniqueTriads = Object.keys(triadMap)

// Info bar
document.getElementById('info').textContent =
  `${data.file_path} — ${duration.toFixed(2)}s — ${uniqueTriads.length} unique triads`

// Make lanes
const regionsHarmony = RegionsPlugin.create()
const regionsMelody = RegionsPlugin.create()

const wsHarmony = WaveSurfer.create({
  ...WS_DEFAULTS,
  container: "#harmony-waveform",
  plugins: [regionsHarmony, TimelinePlugin.create()]
})
const wsMelody = WaveSurfer.create({
  ...WS_DEFAULTS,
  container: "#melody-waveform",
  plugins: [regionsMelody, TimelinePlugin.create()]
})

const segmentsHarmony = data.harmony_segments.map(([startFrame, endFrame, label]) => ({
  start: startFrame,
  end:   endFrame,
  label,
}))

// Load same audio into both lanes
wsHarmony.load(data.file_path)
wsMelody.load(data.file_path)

wsHarmony.on('ready', () => {
  document.getElementById('play-button').disabled = false

  for (const seg of segmentsHarmony) {
    regionsHarmony.addRegion({
      start:  seg.start,
      end:    seg.end,
      color:  segmentColor(seg.label),
      drag:   false,
      resize: false,
    })
  }

  const canvas  = document.getElementById('harmony-label-canvas')
  canvas.width  = Math.ceil(duration * MIN_PX_PER_SEC)
  canvas.height = HEIGHT

  const ctx = canvas.getContext('2d')
  ctx.font      = LABEL_FONT
  ctx.fillStyle = 'rgba(220, 220, 220, 0.85)'

  // Offscreen canvas just for text measurement
  const ruler = Object.assign(document.createElement('canvas').getContext('2d'), { font: LABEL_FONT })

  let lastRight = 0
  let row       = 0

  for (const seg of segmentsHarmony) {
    const x     = seg.start * MIN_PX_PER_SEC
    const width = ruler.measureText(seg.label).width

    row = (x < lastRight) ? row + 1 : 0

    ctx.fillText(seg.label, x + 2, ROW_HEIGHT + ROW_HEIGHT * row)
    lastRight = x + width
  }

  })
})

// Playback control
const playButton = document.getElementById('play-button')
playButton.onclick = () => {
  wsHarmony.playPause()
  // Keep melody cursor in sync when the harmony lane drives playback
  if (wsHarmony.isPlaying()) {
    wsMelody.setTime(wsHarmony.getCurrentTime())
    wsMelody.play()
  } else {
    wsMelody.pause()
  }
}

wsHarmony.on('play',   () => { playButton.textContent = 'Pause'; wsMelody.play()  })
wsHarmony.on('pause',  () => { playButton.textContent = 'Play';  wsMelody.pause() })
wsHarmony.on('finish', () => { playButton.textContent = 'Play';  wsMelody.pause() })

// Keep melody cursor synced during playback
wsHarmony.on('timeupdate', (t) => wsMelody.setTime(t))
